<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тикеты — DreamCore</title>
<style>
:root {
  --md-sys-color-primary: #ff9d00;
  --md-sys-color-on-primary: #0a0a0a;
  --md-sys-color-primary-container: rgba(255,157,0,0.12);
  --md-sys-color-on-primary-container: #ff9d00;
  --md-sys-color-secondary: #ff6b00;
  --md-sys-color-surface: #141416;
  --md-sys-color-surface-dim: #0f0f11;
  --md-sys-color-surface-bright: #1c1c1f;
  --md-sys-color-surface-container-lowest: #0a0a0c;
  --md-sys-color-surface-container-low: #111113;
  --md-sys-color-surface-container: #18181a;
  --md-sys-color-surface-container-high: #1e1e21;
  --md-sys-color-surface-container-highest: #252528;
  --md-sys-color-on-surface: #f0f0f5;
  --md-sys-color-on-surface-variant: #8a8a95;
  --md-sys-color-outline: rgba(255,157,0,0.15);
  --md-sys-color-outline-variant: rgba(255,157,0,0.08);
  --md-elevation-1: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.24);
  --md-elevation-2: 0 3px 6px rgba(0,0,0,0.32), 0 2px 4px rgba(0,0,0,0.24);
  --md-elevation-3: 0 6px 12px rgba(0,0,0,0.35), 0 4px 8px rgba(0,0,0,0.28);
  --md-elevation-4: 0 8px 16px rgba(0,0,0,0.38), 0 6px 12px rgba(0,0,0,0.30);
  --md-sys-shape-corner-none: 0px;
  --md-sys-shape-corner-extra-small: 4px;
  --md-sys-shape-corner-small: 8px;
  --md-sys-shape-corner-medium: 12px;
  --md-sys-shape-corner-large: 16px;
  --md-sys-shape-corner-extra-large: 28px;
  --md-sys-shape-corner-full: 50%;
  --md-sys-motion-easing-standard: cubic-bezier(0.4, 0.0, 0.2, 1);
  --md-sys-motion-easing-decelerate: cubic-bezier(0.0, 0.0, 0.2, 1);
  --md-sys-motion-duration-short: 150ms;
  --md-sys-motion-duration-medium: 250ms;
  --md-sys-motion-duration-long: 350ms;
  --rail-width: 80px;
  --gap: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--md-sys-color-surface-dim);
  color: var(--md-sys-color-on-surface);
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--md-sys-color-surface-dim); }
::-webkit-scrollbar-thumb { background: var(--md-sys-color-outline); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--md-sys-color-primary); }

/* ===== Rail Navigation ===== */
.rail {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: var(--rail-width);
  background: var(--md-sys-color-surface-container);
  border-right: 1px solid var(--md-sys-color-outline-variant);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1rem 0;
  z-index: 1000;
  gap: 0.5rem;
}

.rail-logo {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--md-sys-color-primary), var(--md-sys-color-secondary));
  border-radius: var(--md-sys-shape-corner-medium);
  display: grid; place-items: center;
  margin-bottom: 1.5rem;
  box-shadow: var(--md-elevation-1);
}

.rail-logo svg { width: 22px; height: 22px; fill: var(--md-sys-color-on-primary); }

.rail-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.25rem;
  padding: 0.75rem 0.5rem;
  border-radius: var(--md-sys-shape-corner-large);
  color: var(--md-sys-color-on-surface-variant);
  text-decoration: none;
  font-size: 0.7rem;
  font-weight: 500;
  width: 64px;
  transition: all var(--md-sys-motion-duration-short) var(--md-sys-motion-easing-standard);
  cursor: pointer;
  border: none;
  background: transparent;
}

.rail-item:hover {
  background: var(--md-sys-color-surface-container-high);
  color: var(--md-sys-color-on-surface);
}

.rail-item svg { width: 24px; height: 24px; fill: currentColor; }

.rail-icon-only { position: relative; }

.rail-icon-only .rail-tooltip {
  position: absolute;
  left: 70px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--md-sys-color-surface-container-highest);
  color: var(--md-sys-color-on-surface);
  padding: 0.4rem 0.8rem;
  border-radius: var(--md-sys-shape-corner-medium);
  font-size: 0.8rem;
  white-space: nowrap;
  opacity: 0;
  visibility: hidden;
  transition: all 0.2s ease;
  box-shadow: var(--md-elevation-2);
  border: 1px solid var(--md-sys-color-outline-variant);
  pointer-events: none;
  z-index: 1001;
}

.rail-icon-only:hover .rail-tooltip {
  opacity: 1;
  visibility: visible;
  left: 75px;
}

.rail-divider {
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #ff9d00, #ff6b00, transparent);
  margin: 0.5rem 0;
  border-radius: 1px;
  box-shadow: 0 0 8px rgba(255, 157, 0, 0.4);
}

/* ===== Main content ===== */
.main {
  margin-left: var(--rail-width);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 2rem;
  width: 100%;
}

/* ===== Page Header ===== */
.page-header {
  padding: 2rem 0 1.5rem;
}

.page-header h1 {
  font-size: 2.2rem;
  font-weight: 400;
  line-height: 1.2;
  letter-spacing: -0.02em;
  margin-bottom: 0.5rem;
}

.page-header p {
  color: var(--md-sys-color-on-surface-variant);
  font-size: 1rem;
}

/* ===== Neon Glow Buttons ===== */
.btn-wrap {
  position: relative;
  padding: 3px;
  background: linear-gradient(90deg, #ff9d00, #ff6b00, #ff4500);
  border-radius: 0.9em;
  transition: all 0.4s ease;
  display: inline-flex;
  cursor: pointer;
}

.btn-wrap::before {
  content: "";
  position: absolute;
  inset: 0;
  margin: auto;
  border-radius: 0.9em;
  z-index: -1;
  filter: blur(0);
  transition: filter 0.4s ease;
}

.btn-wrap:hover::before {
  background: linear-gradient(90deg, #ff9d00, #ff6b00, #ff4500);
  filter: blur(1.2em);
}

.btn-wrap:active::before {
  filter: blur(0.2em);
}

.btn-wrap .btn-inner {
  font-size: 0.85rem;
  padding: 0.5em 1.2em;
  border-radius: 0.5em;
  border: none;
  background: linear-gradient(135deg, #ff9d00, #ff6b00);
  color: #fff;
  cursor: pointer;
  box-shadow: 2px 2px 3px rgba(0,0,0,0.7);
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: all 0.2s ease;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  text-decoration: none;
}

.btn-wrap .btn-inner:hover {
  background-color: #111;
}

.btn-wrap .btn-inner:active {
  transform: scale(0.97);
}

.btn-wrap-lg {
  padding: 4px;
  border-radius: 1em;
}

.btn-wrap-lg::before { border-radius: 1em; }
.btn-wrap-lg .btn-inner {
  font-size: 1rem;
  padding: 0.7em 1.8em;
  border-radius: 0.6em;
}

.btn-wrap-sm {
  padding: 2px;
  border-radius: 0.7em;
}

.btn-wrap-sm::before { border-radius: 0.7em; }
.btn-wrap-sm .btn-inner {
  font-size: 0.75rem;
  padding: 0.4em 0.8em;
  border-radius: 0.4em;
}

/* ===== Neon Ticket Status Badges ===== */
.ticket-badge {
  position: relative;
  display: inline-flex;
  align-items: center;
  padding: 0.35rem 0.9rem;
  border-radius: var(--md-sys-shape-corner-medium);
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border: none;
  overflow: hidden;
}

.ticket-badge-open {
  background: rgba(76, 175, 80, 0.12);
  color: #4caf50;
  box-shadow:
    0 0 8px rgba(76, 175, 80, 0.25),
    0 0 16px rgba(76, 175, 80, 0.15),
    inset 0 0 6px rgba(76, 175, 80, 0.08);
  animation: neonGreenPulse 3s ease-in-out infinite;
}

@keyframes neonGreenPulse {
  0%, 100% {
    box-shadow: 0 0 8px rgba(76, 175, 80, 0.25), 0 0 16px rgba(76, 175, 80, 0.15), inset 0 0 6px rgba(76, 175, 80, 0.08);
  }
  50% {
    box-shadow: 0 0 14px rgba(76, 175, 80, 0.45), 0 0 28px rgba(76, 175, 80, 0.25), inset 0 0 10px rgba(76, 175, 80, 0.15);
  }
}

.ticket-badge-progress {
  background: rgba(255, 157, 0, 0.12);
  color: #ff9d00;
  box-shadow:
    0 0 8px rgba(255, 157, 0, 0.25),
    0 0 16px rgba(255, 157, 0, 0.15),
    inset 0 0 6px rgba(255, 157, 0, 0.08);
  animation: neonOrangePulse 3s ease-in-out infinite;
}

@keyframes neonOrangePulse {
  0%, 100% {
    box-shadow: 0 0 8px rgba(255, 157, 0, 0.25), 0 0 16px rgba(255, 157, 0, 0.15), inset 0 0 6px rgba(255, 157, 0, 0.08);
  }
  50% {
    box-shadow: 0 0 14px rgba(255, 157, 0, 0.45), 0 0 28px rgba(255, 157, 0, 0.25), inset 0 0 10px rgba(255, 157, 0, 0.15);
  }
}

.ticket-badge-closed {
  background: rgba(138, 138, 149, 0.12);
  color: #8a8a95;
  box-shadow:
    0 0 8px rgba(138, 138, 149, 0.15),
    0 0 16px rgba(138, 138, 149, 0.08),
    inset 0 0 6px rgba(138, 138, 149, 0.05);
}

/* ===== Support Layout ===== */
.support-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: var(--gap);
  margin-bottom: 2rem;
  min-height: 600px;
}

/* ===== Tickets Sidebar ===== */
.tickets-sidebar {
  background: var(--md-sys-color-surface-container);
  border-radius: var(--md-sys-shape-corner-extra-large);
  padding: 1.5rem;
  box-shadow: var(--md-elevation-2);
  border: 1px solid var(--md-sys-color-outline-variant);
  display: flex;
  flex-direction: column;
  gap: 1rem;
  max-height: 700px;
  overflow-y: auto;
}

.sidebar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.sidebar-header h2 {
  font-size: 1.1rem;
  font-weight: 500;
}

.ticket-filters {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 0.3rem 0.7rem;
  border-radius: var(--md-sys-shape-corner-small);
  border: 1px solid var(--md-sys-color-outline-variant);
  background: transparent;
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn:hover, .filter-btn.active {
  border-color: var(--md-sys-color-primary);
  color: var(--md-sys-color-primary);
  background: var(--md-sys-color-primary-container);
}

/* ===== Ticket List Item ===== */
.ticket-item {
  padding: 1rem;
  border-radius: var(--md-sys-shape-corner-large);
  background: var(--md-sys-color-surface-container-low);
  border: 1px solid var(--md-sys-color-outline-variant);
  cursor: pointer;
  transition: all var(--md-sys-motion-duration-medium);
  position: relative;
  overflow: hidden;
}

.ticket-item:hover {
  background: var(--md-sys-color-surface-container-high);
  border-color: var(--md-sys-color-outline);
  transform: translateX(4px);
}

.ticket-item.active {
  border-color: var(--md-sys-color-primary);
  background: var(--md-sys-color-primary-container);
}

.ticket-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--md-sys-color-primary), var(--md-sys-color-secondary));
}

.ticket-item-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.5rem;
}

.ticket-item-title {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--md-sys-color-on-surface);
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.ticket-item-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 0.75rem;
}

.ticket-item-date {
  font-size: 0.75rem;
  color: var(--md-sys-color-on-surface-variant);
}

.ticket-item-reopened {
  font-size: 0.7rem;
  color: var(--md-sys-color-primary);
  font-weight: 500;
}

/* ===== Chat Area ===== */
.chat-area {
  background: var(--md-sys-color-surface-container);
  border-radius: var(--md-sys-shape-corner-extra-large);
  box-shadow: var(--md-elevation-2);
  border: 1px solid var(--md-sys-color-outline-variant);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.chat-area::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--md-sys-color-primary), var(--md-sys-color-secondary));
  z-index: 10;
}

.chat-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.75rem;
}

.chat-header-info h3 {
  font-size: 1.1rem;
  font-weight: 500;
  margin-bottom: 0.25rem;
}

.chat-header-info p {
  font-size: 0.8rem;
  color: var(--md-sys-color-on-surface-variant);
}

.chat-header-actions {
  display: flex;
  gap: 0.5rem;
}

/* ===== Messages ===== */
.messages-container {
  flex: 1;
  padding: 1.5rem;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  min-height: 350px;
  max-height: 500px;
}

.message {
  display: flex;
  gap: 0.75rem;
  max-width: 80%;
}

.message-own {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.message-avatar {
  width: 36px;
  height: 36px;
  border-radius: var(--md-sys-shape-corner-medium);
  background: linear-gradient(135deg, var(--md-sys-color-primary), var(--md-sys-color-secondary));
  display: grid;
  place-items: center;
  flex-shrink: 0;
}

.message-avatar svg {
  width: 18px;
  height: 18px;
  fill: var(--md-sys-color-on-primary);
}

.message-avatar.support {
  background: linear-gradient(135deg, #7c4dff, #a855f7);
}

.message-bubble {
  background: var(--md-sys-color-surface-container-low);
  border-radius: var(--md-sys-shape-corner-large);
  padding: 0.875rem 1rem;
  border: 1px solid var(--md-sys-color-outline-variant);
}

.message-own .message-bubble {
  background: var(--md-sys-color-primary-container);
  border-color: var(--md-sys-color-outline);
}

.message-text {
  font-size: 0.9rem;
  color: var(--md-sys-color-on-surface);
  line-height: 1.5;
}

.message-time {
  font-size: 0.7rem;
  color: var(--md-sys-color-on-surface-variant);
  margin-top: 0.4rem;
  text-align: right;
}

/* ===== Chat Input ===== */
.chat-input-area {
  padding: 1rem 1.5rem 1.5rem;
  border-top: 1px solid var(--md-sys-color-outline-variant);
}

.chat-input-wrap {
  display: flex;
  gap: 0.75rem;
  align-items: flex-end;
}

.chat-input {
  flex: 1;
  background: var(--md-sys-color-surface-container-low);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--md-sys-shape-corner-large);
  padding: 0.875rem 1rem;
  color: var(--md-sys-color-on-surface);
  font-size: 0.9rem;
  font-family: inherit;
  resize: none;
  min-height: 48px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.2s;
}

.chat-input:focus {
  border-color: var(--md-sys-color-primary);
}

.chat-input::placeholder {
  color: var(--md-sys-color-on-surface-variant);
}

/* ===== New Ticket Modal ===== */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 2000;
  justify-content: center;
  align-items: center;
  padding: 1rem;
  opacity: 0;
  transition: opacity var(--md-sys-motion-duration-medium);
}

.modal-overlay.active { display: flex; opacity: 1; }

.modal-box {
  background: var(--md-sys-color-surface-container-high);
  border-radius: var(--md-sys-shape-corner-extra-large);
  padding: 2rem;
  max-width: 480px;
  width: 100%;
  box-shadow: var(--md-elevation-4);
  border: 1px solid var(--md-sys-color-outline-variant);
  transform: scale(0.85) translateY(20px);
  transition: transform var(--md-sys-motion-duration-long) var(--md-sys-motion-easing-decelerate);
}

.modal-overlay.active .modal-box { transform: scale(1) translateY(0); }

.modal-box h3 {
  font-size: 1.25rem;
  font-weight: 500;
  margin-bottom: 0.5rem;
}

.modal-box p {
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.9rem;
  margin-bottom: 1.5rem;
}

.form-group {
  margin-bottom: 1rem;
}

.form-group label {
  display: block;
  font-size: 0.85rem;
  font-weight: 500;
  margin-bottom: 0.4rem;
  color: var(--md-sys-color-on-surface);
}

.form-input {
  width: 100%;
  background: var(--md-sys-color-surface-container-low);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--md-sys-shape-corner-medium);
  padding: 0.75rem 1rem;
  color: var(--md-sys-color-on-surface);
  font-size: 0.9rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus {
  border-color: var(--md-sys-color-primary);
}

.form-textarea {
  min-height: 100px;
  resize: vertical;
}

.modal-actions {
  display: flex;
  gap: 0.75rem;
  justify-content: flex-end;
  margin-top: 1.5rem;
}

/* ===== Footer ===== */
.footer {
  margin-top: auto;
  padding: 1.5rem 0 2rem;
  border-top: 1px solid var(--md-sys-color-outline-variant);
}

.footer-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1.5rem;
}

.footer-links {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.footer-links a {
  color: var(--md-sys-color-on-surface-variant);
  text-decoration: none;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  transition: color var(--md-sys-motion-duration-short);
}

.footer-links a:hover { color: var(--md-sys-color-primary); }
.footer-links svg { width: 14px; height: 14px; fill: currentColor; }

.footer-copy {
  text-align: center;
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.78rem;
  margin-top: 1.5rem;
  opacity: 0.6;
}

/* ===== Gradient text ===== */
.gradient-text {
  background: linear-gradient(135deg, var(--md-sys-color-primary), var(--md-sys-color-secondary), #ff4500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ===== Animations ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.anim {
  animation: fadeUp var(--md-sys-motion-duration-long) var(--md-sys-motion-easing-decelerate) forwards;
  opacity: 0;
}

.anim-d1 { animation-delay: 50ms; }
.anim-d2 { animation-delay: 100ms; }
.anim-d3 { animation-delay: 150ms; }
.anim-d4 { animation-delay: 200ms; }

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .rail { width: 64px; }
  .rail-item span { display: none; }
  .rail-item { width: 48px; padding: 0.75rem 0; }
  .main { margin-left: 64px; }
  .support-layout { grid-template-columns: 1fr; }
  .tickets-sidebar { max-height: 300px; }
}

@media (max-width: 600px) {
  .rail { display: none; }
  .main { margin-left: 0; }
  .container { padding: 0 1rem; }
  .support-layout { grid-template-columns: 1fr; }
  .message { max-width: 90%; }
  .chat-header { flex-direction: column; align-items: flex-start; }
  .footer-inner { flex-direction: column; text-align: center; }
}
</style>
<base target="_blank">
</head>

<!-- Rail Navigation -->
<div id="rail-placeholder"></div>
<script>
(function(){
  var xhr = new XMLHttpRequest();
  xhr.open('GET','/rail.html',true);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4 && xhr.status===200){
      var ph = document.getElementById('rail-placeholder');
      if(ph) ph.outerHTML = xhr.responseText;
    }
  };
  xhr.send();
})();
</script>

    <div class="support-layout anim anim-d1">
      <!-- Tickets Sidebar -->

        <div class="sidebar-header">

          <button class="filter-btn active" onclick="filterTickets('all')">Все</button>
          <button class="filter-btn" onclick="filterTickets('open')">Открытые</button>
          <button class="filter-btn" onclick="filterTickets('progress')">В работе</button>
          <button class="filter-btn" onclick="filterTickets('closed')">Закрытые</button>
        </div>

      <!-- Chat Area -->

            <p id="chat-meta"></p>
          </div>

                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                Закрыть тикет

            </div>
          </div>
        </div>

        <div class="messages-container" id="messages"></div>

        <div class="chat-input-area">

              </button>

      </div>

<!-- New Ticket Modal -->
<div class="modal-overlay" id="new-ticket-modal" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>Новый тикет</h3>
    <p>Опишите вашу проблему как можно подробнее. Мы ответим в ближайшее время.</p>
    <div class="form-group">
      <label>Тема</label>
      <input type="text" class="form-input" id="ticket-title" placeholder="Например: Проблема с подключением">
    </div>
    <div class="form-group">
      <label>Описание</label>
      <textarea class="form-input form-textarea" id="ticket-desc" placeholder="Опишите ситуацию..."></textarea>
    </div>
    <div class="modal-actions">
      <div class="btn-wrap btn-wrap-sm" onclick="closeModal()">
        <button class="btn-inner" style="background:var(--md-sys-color-surface-container-high); color:var(--md-sys-color-on-surface-variant);">Отмена</button>
      </div>
      <div class="btn-wrap" onclick="createTicket()">
        <button class="btn-inner">Создать тикет</button>
      </div>
    </div>
  </div>
</div>

<script>
let currentTicketId = 1;

function selectTicket(id) {
  currentTicketId = id;
  document.querySelectorAll('.ticket-item').forEach(el => el.classList.remove('active'));
  const ticketEl = document.querySelector('.ticket-item[data-id="' + id + '"]');
  if (!ticketEl) return;
  ticketEl.classList.add('active');

  // Read ticket data from DOM
  var titleEl = ticketEl.querySelector('.ticket-item-title');
  var dateEl = ticketEl.querySelector('.ticket-item-date');
  var badgeEl = ticketEl.querySelector('.ticket-badge');
  var title = titleEl ? titleEl.textContent : '';
  var date = dateEl ? dateEl.textContent : '';
  var status = ticketEl.getAttribute('data-status') || 'open';
  var badgeClass = badgeEl ? badgeEl.className.replace('ticket-badge ', '') : 'ticket-badge-open';
  var badgeText = badgeEl ? badgeEl.textContent : 'Открыт';

  document.getElementById('chat-title').textContent = title;
  document.getElementById('chat-meta').innerHTML = 'Тикет #' + id + ' · Создан ' + date + ' · Статус: <span class="ticket-badge ' + badgeClass + '">' + badgeText + '</span>';

  // Show/hide close button
  const actions = document.getElementById('chat-actions');
  if (status === 'closed') {
    actions.innerHTML = '<div class="btn-wrap btn-wrap-sm" onclick="reopenTicket()"><button class="btn-inner"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>Поднять заново</button></div>';
  } else {
    actions.innerHTML = '<div class="btn-wrap btn-wrap-sm" onclick="closeTicket()"><button class="btn-inner"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>Закрыть тикет</button></div>';
  }

  // Clear messages
  document.getElementById('messages').innerHTML = '';
}

function filterTickets(status) {
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  document.querySelectorAll('.ticket-item').forEach(item => {
    if (status === 'all' || item.getAttribute('data-status') === status) {
      item.style.display = 'block';
    } else {
      item.style.display = 'none';
    }
  });
}

function sendMessage() {
  const input = document.getElementById('message-input');
  const text = input.value.trim();
  if (!text) return;

  const messages = document.getElementById('messages');
  const time = new Date().toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }).replace(',', '');

  const msgHtml = '<div class="message message-own"><div class="message-avatar"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div><div class="message-bubble"><div class="message-text">' + escapeHtml(text) + '</div><div class="message-time">' + time + '</div></div></div>';

  messages.insertAdjacentHTML('beforeend', msgHtml);
  messages.scrollTop = messages.scrollHeight;
  input.value = '';
  input.rows = 1;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function closeTicket() {
  const item = document.querySelector('.ticket-item[data-id="' + currentTicketId + '"]');
  if (item) {
    item.setAttribute('data-status', 'closed');
    item.querySelector('.ticket-badge').className = 'ticket-badge ticket-badge-closed';
    item.querySelector('.ticket-badge').textContent = 'Закрыт';
  }
  selectTicket(currentTicketId);
}

function reopenTicket() {
  const item = document.querySelector('.ticket-item[data-id="' + currentTicketId + '"]');
  if (item) {
    item.setAttribute('data-status', 'open');
    item.querySelector('.ticket-badge').className = 'ticket-badge ticket-badge-open';
    item.querySelector('.ticket-badge').textContent = 'Открыт';
    const meta = item.querySelector('.ticket-item-meta');
    if (!meta.querySelector('.ticket-item-reopened')) {
      meta.insertAdjacentHTML('beforeend', '<span class="ticket-item-reopened">↑ Поднят заново</span>');
    }
    // Move to top
    const list = document.getElementById('ticket-list');
    list.insertBefore(item, list.firstChild);
  }
  selectTicket(currentTicketId);
}

function openNewTicketModal() {
  document.getElementById('new-ticket-modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (!e || e.target.id === 'new-ticket-modal') {
    document.getElementById('new-ticket-modal').classList.remove('active');
    document.body.style.overflow = '';
  }
}

function createTicket() {
  const title = document.getElementById('ticket-title').value.trim();
  if (!title) return;

  const list = document.getElementById('ticket-list');
  const id = Date.now();
  const date = new Date().toLocaleDateString('ru-RU');

  const ticketHtml = '<div class="ticket-item active" data-status="open" data-id="' + id + '" onclick="selectTicket(' + id + ')"><div class="ticket-item-header"><span class="ticket-badge ticket-badge-open">Открыт</span></div><div class="ticket-item-title">' + escapeHtml(title) + '</div><div class="ticket-item-meta"><span class="ticket-item-date">' + date + '</span></div></div>';

  list.insertBefore(document.createRange().createContextualFragment(ticketHtml).firstChild, list.firstChild);
  closeModal();
  document.getElementById('ticket-title').value = '';
  document.getElementById('ticket-desc').value = '';
  selectTicket(id);
}

// Auto-resize textarea
document.getElementById('message-input').addEventListener('input', function() {
  this.rows = 1;
  const newRows = Math.min(5, Math.ceil(this.scrollHeight / 24));
  this.rows = newRows;
});

document.getElementById('message-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>

</body>
