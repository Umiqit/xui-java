<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — DreamCore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .login-box { max-width: 400px; margin: 80px auto; padding: 30px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
    </style>
</head>
<body>
    <div class="login-box">
        <h3 class="mb-4">Личный кабинет</h3>
        <p class="text-muted mb-4">Войдите через Telegram, чтобы управлять своими ключами.</p>
        <div id="telegram-login"></div>
    </div>

    <script>
        function onTelegramAuth(user) {
            fetch('/auth/telegram', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(user)
            })
            .then(r => {
                if (r.ok) {
                    window.location.href = '/profile';
                } else {
                    alert('Ошибка авторизации. Попробуйте ещё раз.');
                }
            })
            .catch(() => alert('Ошибка соединения.'));
        }
    </script>
    <script async src="https://telegram.org/js/telegram-widget.js?22"
            th:attr="data-telegram-login=${botUsername}"
            data-size="large"
            data-onauth="onTelegramAuth(user)"
            data-request-access="write">
    </script>
</body>
</html>
