<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — DreamCore</title>
<style>
:root {
  --md-sys-color-primary: #ff9d00;
  --md-sys-color-on-primary: #0a0a0a;
  --md-sys-color-primary-container: rgba(255,157,0,0.12);
  --md-sys-color-on-primary-container: #ff9d00;
  --md-sys-color-secondary: #ff6b00;
  --md-sys-color-surface: #141416;
  --md-sys-color-surface-dim: #0f0f11;
  --md-sys-color-surface-bright: #1c1c1f;
  --md-sys-color-surface-container-lowest: #0a0a0c;
  --md-sys-color-surface-container-low: #111113;
  --md-sys-color-surface-container: #18181a;
  --md-sys-color-surface-container-high: #1e1e21;
  --md-sys-color-surface-container-highest: #252528;
  --md-sys-color-on-surface: #f0f0f5;
  --md-sys-color-on-surface-variant: #8a8a95;
  --md-sys-color-outline: rgba(255,157,0,0.15);
  --md-sys-color-outline-variant: rgba(255,157,0,0.08);
  --md-elevation-1: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.24);
  --md-elevation-2: 0 3px 6px rgba(0,0,0,0.32), 0 2px 4px rgba(0,0,0,0.24);
  --md-elevation-3: 0 6px 12px rgba(0,0,0,0.35), 0 4px 8px rgba(0,0,0,0.28);
  --md-elevation-4: 0 8px 16px rgba(0,0,0,0.38), 0 6px 12px rgba(0,0,0,0.30);
  --md-sys-shape-corner-none: 0px;
  --md-sys-shape-corner-extra-small: 4px;
  --md-sys-shape-corner-small: 8px;
  --md-sys-shape-corner-medium: 12px;
  --md-sys-shape-corner-large: 16px;
  --md-sys-shape-corner-extra-large: 28px;
  --md-sys-shape-corner-full: 50%;
  --md-sys-motion-easing-standard: cubic-bezier(0.4, 0.0, 0.2, 1);
  --md-sys-motion-easing-decelerate: cubic-bezier(0.0, 0.0, 0.2, 1);
  --md-sys-motion-duration-short: 150ms;
  --md-sys-motion-duration-medium: 250ms;
  --md-sys-motion-duration-long: 350ms;
  --rail-width: 80px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--md-sys-color-surface-dim);
  color: var(--md-sys-color-on-surface);
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--md-sys-color-surface-dim); }
::-webkit-scrollbar-thumb { background: var(--md-sys-color-outline); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--md-sys-color-primary); }

/* ===== Rail Navigation ===== */
.rail {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: var(--rail-width);
  background: var(--md-sys-color-surface-container);
  border-right: 1px solid var(--md-sys-color-outline-variant);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1rem 0;
  z-index: 1000;
  gap: 0.5rem;
}

.rail-logo {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--md-sys-color-primary), var(--md-sys-color-secondary));
  border-radius: var(--md-sys-shape-corner-medium);
  display: grid; place-items: center;
  margin-bottom: 1.5rem;
  box-shadow: var(--md-elevation-1);
}

.rail-logo svg { width: 22px; height: 22px; fill: var(--md-sys-color-on-primary); }

.rail-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.25rem;
  padding: 0.75rem 0.5rem;
  border-radius: var(--md-sys-shape-corner-large);
  color: var(--md-sys-color-on-surface-variant);
  text-decoration: none;
  font-size: 0.7rem;
  font-weight: 500;
  width: 64px;
  transition: all var(--md-sys-motion-duration-short) var(--md-sys-motion-easing-standard);
  cursor: pointer;
  border: none;
  background: transparent;
}

.rail-item:hover {
  background: var(--md-sys-color-surface-container-high);
  color: var(--md-sys-color-on-surface);
}

.rail-item svg { width: 24px; height: 24px; fill: currentColor; }

.rail-icon-only { position: relative; }

.rail-icon-only .rail-tooltip {
  position: absolute;
  left: 70px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--md-sys-color-surface-container-highest);
  color: var(--md-sys-color-on-surface);
  padding: 0.4rem 0.8rem;
  border-radius: var(--md-sys-shape-corner-medium);
  font-size: 0.8rem;
  white-space: nowrap;
  opacity: 0;
  visibility: hidden;
  transition: all 0.2s ease;
  box-shadow: var(--md-elevation-2);
  border: 1px solid var(--md-sys-color-outline-variant);
  pointer-events: none;
  z-index: 1001;
}

.rail-icon-only:hover .rail-tooltip {
  opacity: 1;
  visibility: visible;
  left: 75px;
}

.rail-divider {
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #ff9d00, #ff6b00, transparent);
  margin: 0.5rem 0;
  border-radius: 1px;
  box-shadow: 0 0 8px rgba(255, 157, 0, 0.4);
}

/* ===== Main content ===== */
.main {
  margin-left: var(--rail-width);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

/* ===== Login Card ===== */
.login-card {
  background: var(--md-sys-color-surface-container);
  border-radius: var(--md-sys-shape-corner-extra-large);
  padding: 3rem;
  max-width: 420px;
  width: 100%;
  text-align: center;
  box-shadow: var(--md-elevation-3);
  border: 1px solid var(--md-sys-color-outline-variant);
  position: relative;
  overflow: hidden;
}

.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--md-sys-color-primary), var(--md-sys-color-secondary));
}

.login-logo {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--md-sys-color-primary), var(--md-sys-color-secondary));
  border-radius: var(--md-sys-shape-corner-large);
  display: grid; place-items: center;
  margin: 0 auto 1.5rem;
  box-shadow: var(--md-elevation-2);
}

.login-logo svg { width: 30px; height: 30px; fill: var(--md-sys-color-on-primary); }

.login-card h1 {
  font-size: 1.75rem;
  font-weight: 400;
  margin-bottom: 0.5rem;
  letter-spacing: -0.01em;
}

.login-card .subtitle {
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.95rem;
  margin-bottom: 2rem;
  line-height: 1.6;
}

/* ===== Neon Glow Buttons ===== */
.btn-wrap {
  position: relative;
  padding: 3px;
  background: linear-gradient(90deg, #ff9d00, #ff6b00, #ff4500);
  border-radius: 0.9em;
  transition: all 0.4s ease;
  display: inline-flex;
  cursor: pointer;
}

.btn-wrap::before {
  content: "";
  position: absolute;
  inset: 0;
  margin: auto;
  border-radius: 0.9em;
  z-index: -1;
  filter: blur(0);
  transition: filter 0.4s ease;
}

.btn-wrap:hover::before {
  background: linear-gradient(90deg, #ff9d00, #ff6b00, #ff4500);
  filter: blur(1.2em);
}

.btn-wrap:active::before {
  filter: blur(0.2em);
}

.btn-wrap .btn-inner {
  font-size: 0.95rem;
  padding: 0.65em 1.4em;
  border-radius: 0.5em;
  border: none;
  background: linear-gradient(135deg, #ff9d00, #ff6b00);
  color: #fff;
  cursor: pointer;
  box-shadow: 2px 2px 3px rgba(0,0,0,0.7);
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: all 0.2s ease;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  text-decoration: none;
}

.btn-wrap .btn-inner:hover {
  background-color: #111;
}

.btn-wrap .btn-inner:active {
  transform: scale(0.97);
}

.btn-wrap-lg {
  padding: 4px;
  border-radius: 1em;
}

.btn-wrap-lg::before { border-radius: 1em; }
.btn-wrap-lg .btn-inner {
  font-size: 1.1rem;
  padding: 0.8em 2em;
  border-radius: 0.6em;
}

/* Telegram widget container */
.telegram-widget {
  margin: 1.5rem 0;
  min-height: 40px;
  display: flex;
  justify-content: center;
}

/* Divider */
.divider {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 1.5rem 0;
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.8rem;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--md-sys-color-outline-variant);
}

/* Info text */
.info-text {
  color: var(--md-sys-color-on-surface-variant);
  font-size: 0.8rem;
  margin-top: 1.5rem;
  line-height: 1.6;
}

.info-text a {
  color: var(--md-sys-color-primary);
  text-decoration: none;
}

.info-text a:hover {
  text-decoration: underline;
}

/* ===== Gradient text ===== */
.gradient-text {
  background: linear-gradient(135deg, var(--md-sys-color-primary), var(--md-sys-color-secondary), #ff4500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ===== Animations ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.anim {
  animation: fadeUp var(--md-sys-motion-duration-long) var(--md-sys-motion-easing-decelerate) forwards;
  opacity: 0;
}

.anim-d1 { animation-delay: 50ms; }
.anim-d2 { animation-delay: 100ms; }
.anim-d3 { animation-delay: 150ms; }

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .rail { width: 64px; }
  .rail-item span { display: none; }
  .rail-item { width: 48px; padding: 0.75rem 0; }
  .main { margin-left: 64px; }
}

@media (max-width: 600px) {
  .rail { display: none; }
  .main { margin-left: 0; padding: 1rem; }
  .login-card { padding: 2rem 1.5rem; }
}
</style>
</head>
<body>

<!-- Rail Navigation -->
<div id="rail-placeholder"></div>
<script>
(function(){
  var xhr = new XMLHttpRequest();
  xhr.open('GET','/rail.html',true);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4 && xhr.status===200){
      var ph = document.getElementById('rail-placeholder');
      if(ph) ph.outerHTML = xhr.responseText;
    }
  };
  xhr.send();
})();
</script>

<!-- Main Content -->
<div class="main">
  <div class="login-card anim">
    <div class="login-logo anim anim-d1">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
    </div>
    <h1 class="anim anim-d1">Личный <span class="gradient-text">кабинет</span></h1>
    <p class="subtitle anim anim-d2">Войдите через Telegram, чтобы управлять своими ключами и балансом.</p>

    <div th:if="${botUsername == null or botUsername.isBlank()}" class="anim anim-d2" style="color:#f44336; background:rgba(244,67,54,0.15); padding:1rem; border-radius:12px; font-weight:500; margin:1rem 0;">
      Ошибка: имя бота не настроено. Проверьте переменную <code>BOT_USERNAME</code> в файле <code>.env</code> и перезапустите контейнер сайта.
    </div>
    <div th:unless="${botUsername == null or botUsername.isBlank()}" class="telegram-widget anim anim-d2" id="telegram-login"></div>

    <div class="divider anim anim-d3">или</div>

    <div class="btn-wrap btn-wrap-lg anim anim-d3" onclick="window.location.href='/'">
      <button class="btn-inner">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Вернуться на главную
      </button>
    </div>

    <p class="info-text anim anim-d3">
      Авторизуясь, вы соглашаетесь с <a href="/offer">офертой</a> и <a href="/privacy">политикой конфиденциальности</a>.
    </p>
  </div>
</div>

<script>
function onTelegramAuth(user) {
    fetch('/auth/telegram', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(user)
    })
    .then(r => {
        if (r.ok) {
            window.location.href = '/profile';
        } else {
            alert('Ошибка авторизации. Попробуйте ещё раз.');
        }
    })
    .catch(() => alert('Ошибка соединения.'));
}
</script>
<script th:inline="javascript" th:unless="${botUsername == null or botUsername.isBlank()}">
(function(){
  var botUsername = /*[[${botUsername}]]*/ '';
  var container = document.getElementById('telegram-login');
  if (!container) return;

  var s = document.createElement('script');
  s.async = true;
  s.src = 'https://telegram.org/js/telegram-widget.js?22';
  s.setAttribute('data-telegram-login', botUsername);
  s.setAttribute('data-size', 'large');
  s.setAttribute('data-onauth', 'onTelegramAuth(user)');
  s.setAttribute('data-request-access', 'write');
  container.appendChild(s);

  setTimeout(function(){
    var widget = document.querySelector('iframe[id^="telegram-login"]');
    if (!widget) {
      container.innerHTML = '<div style="color:var(--md-sys-color-on-surface-variant); font-size:0.85rem; padding:0.5rem;">' +
        'Если кнопка Telegram не появилась, убедитесь, что домен <strong>dreamchatai.website</strong> добавлен в настройках бота через @BotFather (раздел <em>Bot Settings → Domain</em>).<br><br>' +
        'Или напишите боту: <a href="https://t.me/' + botUsername + '" style="color:var(--md-sys-color-primary);" target="_blank">@' + botUsername + '</a>' +
        '</div>';
    }
  }, 3000);
})();
</script>

</body>
</html>
